name: Premium Blogger Automation Bot

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পর পর স্বয়ংক্রিয়ভাবে পোস্ট হবে
  workflow_dispatch: # ম্যানুয়ালি বাটনে ক্লিক করেও রান করা যাবে

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Necessary Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai

    - name: Execute Automation Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        BLOGGER_EMAIL: ${{ secrets.BLOGGER_EMAIL }}
      run: python blogger_bot.py

    - name: Commit and Push State to Maintain Category Loop
      run: |
        git config --global user.name "Blogger Bot"
        git config --global user.email "bot@blogger.com"
        git add loop_state.txt || true
        git commit -m "Update category loop state [skip ci]" || true
        git push
        
